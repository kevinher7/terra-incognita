name: CI

# The gate every feature slice lands behind (issue #1): uv sync -> ruff -> pytest.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      # Core + dev groups only (no `--extra ml`): CI stays lean and fast. --frozen
      # asserts uv.lock is in sync with pyproject.toml.
      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check

      - name: Test (pytest)
        run: uv run pytest

  # The connected end-to-end smoke (issue #7): the regression backbone that chains every stage
  # on synthetic fixtures and gates every PR. Separate from `check` because it needs the heavy
  # `ml` extra (torch/ultralytics/mlflow), which the lean gate deliberately omits. It runs
  # server-free — tmp SQLite backend + tmp local artifact dir, in-process load_model, in-memory
  # OTel exporter — so no docker stack (floci/MLflow server) is needed.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      # Lean locked env first (asserts uv.lock is in sync). uv installs terra_incognita
      # *editable* (src/ layout) — which the smoke relies on: the wide-event registry loader
      # resolves the read-only `.plans/` mirror relative to the package's repo-root parent, and
      # `.plans/` is never packaged into a wheel. This also creates the .venv the steps below target.
      - name: Sync dependencies (lean, locked, editable)
        run: uv sync --frozen

      # Install the ml stack with CPU torch — BY NAME, deliberately not via `.[ml]`:
      #   * pyproject pins Linux torch → cu124 for the future GPU box; `--torch-backend=cpu` does
      #     NOT override an explicit [tool.uv.sources] index, so going through `.[ml]` would pull
      #     the big cu124 wheels. Installing torch/torchvision straight from the CPU index gets the
      #     smaller/faster CPU wheels (which run on CPU) without touching the committed sources.
      #   * `uv pip install ".[ml]"` would reinstall terra_incognita as a NON-editable wheel,
      #     breaking the `.plans/` lookup above. Installing only the deps by name leaves the
      #     editable project intact. (This list mirrors pyproject's `[project.optional-dependencies] ml`.)
      - name: Install ml stack (CPU torch)
        run: |
          uv pip install "torch>=2.4" "torchvision>=0.19" --index-url https://download.pytorch.org/whl/cpu
          uv pip install "ultralytics>=8.2" "mlflow>=3.1" "boto3>=1.34"

      # --no-sync so `uv run` doesn't re-resolve to the lockfile and uninstall the ml deps we just
      # installed. We invoke pytest directly (not `just smoke`, whose `--extra ml` would re-pull
      # cu124 on Linux). A deliberate break in the COCO→YOLO math or the serving contract fails here.
      - name: Smoke pipeline (end to end)
        run: uv run --no-sync pytest tests/smoke
